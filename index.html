<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plates</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8c840;
    --text: #f0f0f0;
    --muted: #777;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* ── Scrollable main ── */
  .main {
    flex: 1;
    width: 100%;
    max-width: 480px;
    padding: 1.4rem 1rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  header { text-align: center; }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 8vw, 3.2rem);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--accent);
  }

  header p {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  /* ── Weight input ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1rem 0.8rem;
  }

  .micro-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.55rem;
  }

  .weight-row { display: flex; align-items: center; gap: 0.55rem; }

  .weight-input-wrap { position: relative; flex: 1; }

  .weight-input-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 2.8rem;
    letter-spacing: -0.01em;
    padding: 0.2rem 2.8rem 0.2rem 0.7rem;
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
    text-align: center;
  }

  .weight-input-wrap input::-webkit-outer-spin-button,
  .weight-input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .weight-input-wrap input:focus { border-color: var(--accent); }

  .unit-badge {
    position: absolute;
    right: 0.65rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--muted);
    pointer-events: none;
  }

  .step-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.6rem;
    width: 3.2rem;
    height: 3.2rem;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .step-btn:hover  { background: #232323; border-color: #444; }
  .step-btn:active { background: #2c2c2c; }

  .step-hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.67rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.4rem;
    text-align: right;
  }

  /* ── Results ── */
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
  }

  .totals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.85rem;
  }

  .total-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.7rem 0.85rem;
  }

  .total-box .lbl {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  .total-box .val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.85rem;
    line-height: 1;
    color: var(--accent);
  }

  .total-box .val em {
    font-style: normal;
    font-size: 0.92rem;
    color: var(--muted);
    font-weight: 400;
  }

  /* Bar viz */
  .bar-viz {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 0.55rem 0 0.75rem;
    overflow-x: auto;
    min-height: 66px;
    scrollbar-width: none;
  }
  .bar-viz::-webkit-scrollbar { display: none; }

  .bar-sleeve {
    width: 44px;
    height: 12px;
    background: #484848;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .bar-center {
    height: 8px;
    background: #383838;
    border-radius: 2px;
    flex: 1;
    min-width: 28px;
    max-width: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.55rem;
    color: #5a5a5a;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .viz-plate { border-radius: 2px; flex-shrink: 0; }

  .collar-viz {
    width: 7px;
    border-radius: 1px;
    background: #888;
    flex-shrink: 0;
  }

  .divider { height: 1px; background: var(--border); margin: 0.7rem 0; }

  /* Plate breakdown */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .plate-list { display: flex; flex-direction: column; gap: 0.4rem; }

  .plate-row {
    display: flex;
    align-items: center;
    gap: 0.65rem;
  }

  .plate-row.zero { opacity: 0.2; }

  .plate-chip {
    width: 3.6rem;
    height: 1.85rem;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.02em;
    flex-shrink: 0;
    border: 1px solid transparent;
  }

  /* IWF plate colors */
  .pc-25   { background: #c0392b; color: #fff; }
  .pc-20   { background: #2471a3; color: #fff; }
  .pc-15   { background: #d4ac0d; color: #111; }
  .pc-10   { background: #1e8449; color: #fff; }
  .pc-5    { background: #e8e8e8; color: #111; border-color: #aaa; }
  .pc-2_5  { background: #181818; color: #ccc; border-color: #444; }
  .pc-1_25 { background: #9e9e9e; color: #111; }
  .pc-0_5  { background: #bdbdbd; color: #111; }
  .pc-0_25 { background: #d0d0d0; color: #111; }

  .plate-qty {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--text);
    min-width: 2rem;
  }

  .plate-desc { font-size: 0.79rem; color: var(--muted); }

  /* Alerts */
  .warning {
    background: #2a1212;
    border: 1px solid #6b2020;
    border-radius: 4px;
    padding: 0.6rem 0.85rem;
    font-size: 0.82rem;
    color: #f08080;
    margin-bottom: 0.7rem;
  }

  .remainder {
    background: #12121f;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 0.5rem 0.85rem;
    font-size: 0.79rem;
    color: #8888cc;
    margin-bottom: 0.7rem;
  }

  /* ── Sticky settings drawer ── */
  .settings-bar {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
    z-index: 10;
  }

  .settings-toggle {
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.72rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }

  .settings-toggle:hover { background: #1f1f1f; }

  .s-left { display: flex; align-items: center; gap: 0.5rem; }
  .s-summary { color: var(--muted); font-weight: 400; font-size: 0.75rem; letter-spacing: 0.08em; }

  .arrow {
    transition: transform 0.2s;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .settings-toggle.open .arrow { transform: rotate(180deg); }

  .settings-body {
    display: none;
    padding: 0 1rem 1rem;
    flex-direction: column;
    gap: 0.85rem;
  }

  .settings-body.open { display: flex; }

  .setting-row { display: flex; flex-direction: column; gap: 0.4rem; }

  .setting-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .toggle-group { display: flex; gap: 0.4rem; }

  .toggle-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.86rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.52rem 0.4rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }

  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #111;
    font-weight: 700;
  }

  .toggle-btn:hover:not(.active) { border-color: #444; color: var(--text); }
</style>
</head>
<body>

<div class="main">
  <header>
    <h1>Plates</h1>
    <p>Calibrated KG · IWF Colors</p>
  </header>

  <!-- Weight input -->
  <div class="input-card">
    <div class="micro-label">Target Total Weight</div>
    <div class="weight-row">
      <button class="step-btn" id="minus-btn">−</button>
      <div class="weight-input-wrap">
        <input type="number" id="weight-input" value="100" min="0" max="1000" step="2.5">
        <span class="unit-badge">kg</span>
      </div>
      <button class="step-btn" id="plus-btn">+</button>
    </div>
    <div class="step-hint">± 2.5 kg per tap</div>
  </div>

  <!-- Results -->
  <div class="results-card">
    <div id="warning-box"></div>

    <div class="totals">
      <div class="total-box">
        <div class="lbl">Total</div>
        <div class="val" id="total-kg">— <em>kg</em></div>
      </div>
      <div class="total-box">
        <div class="lbl">Total</div>
        <div class="val" id="total-lbs">— <em>lbs</em></div>
      </div>
    </div>

    <div id="remainder-box"></div>

    <div class="bar-viz" id="bar-viz"></div>

    <div class="divider"></div>

    <div class="section-label">Plates per side</div>
    <div class="plate-list" id="plate-list"></div>
  </div>
</div>

<!-- Sticky settings drawer -->
<div class="settings-bar">
  <button class="settings-toggle" id="settings-toggle">
    <span class="s-left">
      <span>⚙ Settings</span>
      <span class="s-summary" id="s-summary"></span>
    </span>
    <span class="arrow">▲</span>
  </button>
  <div class="settings-body" id="settings-body">
    <div class="setting-row">
      <div class="setting-label">Barbell</div>
      <div class="toggle-group" id="bar-group">
        <button class="toggle-btn active" data-val="20">20 kg — Standard</button>
        <button class="toggle-btn" data-val="25">25 kg — Squat</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Collars</div>
      <div class="toggle-group" id="collar-group">
        <button class="toggle-btn active" data-val="0">No collars</button>
        <button class="toggle-btn" data-val="2.5">2.5 kg collars</button>
      </div>
    </div>
  </div>
</div>

<script>
const PLATES = [25, 20, 15, 10, 5, 2.5, 1.25, 0.5, 0.25];

const CHIP_CLASS = {
  25: 'pc-25', 20: 'pc-20', 15: 'pc-15', 10: 'pc-10',
  5: 'pc-5', 2.5: 'pc-2_5', 1.25: 'pc-1_25', 0.5: 'pc-0_5', 0.25: 'pc-0_25'
};

const VIZ = {
  25:   { h: 62, w: 14, bg: '#c0392b', border: null },
  20:   { h: 54, w: 13, bg: '#2471a3', border: null },
  15:   { h: 46, w: 12, bg: '#d4ac0d', border: null },
  10:   { h: 38, w: 11, bg: '#1e8449', border: null },
  5:    { h: 30, w: 10, bg: '#e0e0e0', border: '#999' },
  2.5:  { h: 25, w: 9,  bg: '#181818', border: '#555' },
  1.25: { h: 21, w: 8,  bg: '#9e9e9e', border: null },
  0.5:  { h: 17, w: 7,  bg: '#bdbdbd', border: null },
  0.25: { h: 14, w: 6,  bg: '#d0d0d0', border: null },
};

let barWeight    = 20;
let collarWeight = 0;
let targetKg     = 100;

const r3    = n => Math.round(n * 1000) / 1000;
const kg2lb = kg => (kg * 2.20462).toFixed(1);
const fmt   = n => parseFloat(n.toFixed(4)).toString();

function updateSummary() {
  const bar = barWeight === 25 ? '25 kg squat bar' : '20 kg bar';
  const col = collarWeight > 0 ? ' · 2.5 kg collars' : '';
  document.getElementById('s-summary').textContent = bar + col;
}

function calculate() {
  const warnEl = document.getElementById('warning-box');
  const remEl  = document.getElementById('remainder-box');
  warnEl.innerHTML = '';
  remEl.innerHTML  = '';

  const equipWeight = barWeight + collarWeight * 2;

  if (targetKg < equipWeight) {
    warnEl.innerHTML = `<div class="warning">Target (${fmt(targetKg)} kg) is less than bar + collars (${fmt(equipWeight)} kg).</div>`;
    document.getElementById('total-kg').innerHTML  = `— <em>kg</em>`;
    document.getElementById('total-lbs').innerHTML = `— <em>lbs</em>`;
    document.getElementById('plate-list').innerHTML = '';
    document.getElementById('bar-viz').innerHTML    = '';
    return;
  }

  const perSide = (targetKg - equipWeight) / 2;
  let remaining = perSide;
  const counts = {};
  PLATES.forEach(p => counts[p] = 0);

  for (const plate of PLATES) {
    if (remaining < 0.001) break;
    const n = Math.floor(r3(remaining / plate));
    if (n > 0) {
      counts[plate] = n;
      remaining = r3(remaining - n * plate);
    }
  }

  const actualTotal = r3(equipWeight + (perSide - remaining) * 2);

  document.getElementById('total-kg').innerHTML  = `${fmt(actualTotal)} <em>kg</em>`;
  document.getElementById('total-lbs').innerHTML = `${kg2lb(actualTotal)} <em>lbs</em>`;

  if (remaining > 0.001) {
    remEl.innerHTML = `<div class="remainder">⚠ Closest achievable: ${fmt(actualTotal)} kg — ${fmt(remaining)} kg/side unloadable with available plates.</div>`;
  }

  renderPlateList(counts);
  renderBarViz(counts);
}

function renderPlateList(counts) {
  const list = document.getElementById('plate-list');
  list.innerHTML = '';
  PLATES.forEach(plate => {
    const qty = counts[plate];
    const row = document.createElement('div');
    row.className = 'plate-row' + (qty === 0 ? ' zero' : '');
    row.innerHTML = `
      <div class="plate-chip ${CHIP_CLASS[plate]}">${fmt(plate)} kg</div>
      <div class="plate-qty">×${qty}</div>
      <div class="plate-desc">${qty === 0 ? '—' : `${qty * 2} plates &nbsp;·&nbsp; ${fmt(qty * plate * 2)} kg total`}</div>
    `;
    list.appendChild(row);
  });
}

function renderBarViz(counts) {
  const viz = document.getElementById('bar-viz');
  viz.innerHTML = '';

  const stack = [];
  PLATES.forEach(p => { for (let i = 0; i < counts[p]; i++) stack.push(p); });

  function makePlate(p) {
    const s = VIZ[p];
    const el = document.createElement('div');
    el.className = 'viz-plate';
    el.style.cssText = `width:${s.w}px;height:${s.h}px;background:${s.bg};` +
      (s.border ? `outline:1px solid ${s.border};` : '');
    el.title = `${fmt(p)} kg`;
    return el;
  }

  function makeCollar() {
    const el = document.createElement('div');
    el.className = 'collar-viz';
    el.style.height = '30px';
    el.title = `${collarWeight} kg collar`;
    return el;
  }

  const sleeve = () => { const d = document.createElement('div'); d.className = 'bar-sleeve'; return d; };
  const center = () => {
    const d = document.createElement('div'); d.className = 'bar-center';
    d.textContent = `${barWeight}kg`; return d;
  };

  viz.appendChild(sleeve());
  if (collarWeight > 0) viz.appendChild(makeCollar());
  [...stack].reverse().forEach(p => viz.appendChild(makePlate(p)));
  viz.appendChild(center());
  stack.forEach(p => viz.appendChild(makePlate(p)));
  if (collarWeight > 0) viz.appendChild(makeCollar());
  viz.appendChild(sleeve());
}

// Settings toggle
const stBtn  = document.getElementById('settings-toggle');
const stBody = document.getElementById('settings-body');
stBtn.addEventListener('click', () => {
  const open = stBody.classList.toggle('open');
  stBtn.classList.toggle('open', open);
});

function setupToggle(groupId, cb) {
  document.getElementById(groupId).querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(groupId).querySelectorAll('.toggle-btn')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cb(parseFloat(btn.dataset.val));
    });
  });
}

setupToggle('bar-group',    v => { barWeight    = v; updateSummary(); calculate(); });
setupToggle('collar-group', v => { collarWeight = v; updateSummary(); calculate(); });

const weightInput = document.getElementById('weight-input');
weightInput.addEventListener('input', () => {
  const v = parseFloat(weightInput.value);
  if (!isNaN(v) && v >= 0) { targetKg = v; calculate(); }
});

document.getElementById('plus-btn').addEventListener('click', () => {
  targetKg = r3(targetKg + 2.5); weightInput.value = targetKg; calculate();
});
document.getElementById('minus-btn').addEventListener('click', () => {
  targetKg = Math.max(0, r3(targetKg - 2.5)); weightInput.value = targetKg; calculate();
});

updateSummary();
calculate();
</script>
</body>
</html>
